<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="base(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — SBOM Maker'">SBOM Maker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #222; }
        nav { background: #1a1a2e; color: #eee; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
        nav a { color: #aad4f5; text-decoration: none; font-size: .95rem; }
        nav a:hover { color: #fff; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; margin-right: auto; display: flex; align-items: center; gap: .6rem; }
        nav .brand img { height: 32px; width: auto; display: block; }
        main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.6rem; margin-bottom: 1.25rem; }
        h2 { font-size: 1.2rem; margin: 1.5rem 0 .75rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th { background: #1a1a2e; color: #eee; padding: .6rem 1rem; text-align: left; font-size: .85rem; }
        td { padding: .6rem 1rem; border-bottom: 1px solid #eee; font-size: .9rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f4ff; }
        .btn { display: inline-block; padding: .4rem .9rem; border-radius: 4px; font-size: .85rem; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #6b7280; color: #fff; }
        .btn-secondary:hover { background: #4b5563; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        form.inline { display: inline; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .card { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 1.25rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; }
        input[type=text], input[type=url], textarea, select {
            width: 100%; padding: .45rem .7rem; border: 1px solid #d1d5db; border-radius: 4px;
            font-size: .9rem; margin-bottom: .9rem;
        }
        input[type=text]:focus, input[type=url]:focus, textarea:focus, select:focus {
            outline: none; border-color: #2563eb;
        }
        .error { color: #dc2626; font-size: .8rem; margin-top: -.6rem; margin-bottom: .6rem; }
        .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
        .tag { display: inline-block; background: #e0e7ff; color: #3730a3; border-radius: 3px; padding: .1rem .45rem; font-size: .78rem; font-weight: 600; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="brand" style="text-decoration:none;">
        <img th:if="${logoUrl}" th:src="${logoUrl}" alt="Logo"/>
        <span>SBOM Maker</span>
    </a>
    <a href="/components">Components</a>
    <a href="/releases">Releases</a>
</nav>
<main th:replace="${content}">
</main>
</body>
</html>
