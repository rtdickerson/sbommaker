<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: base('Component', ~{::main})}">
<body><main>
    <h1 th:text="${component.id != null} ? 'Edit Component' : 'New Component'"></h1>
    <div class="card">
        <form th:action="${component.id != null} ? @{/components/{id}/edit(id=${component.id})} : '/components/new'"
              th:object="${component}" method="post">
            <label for="name">Name *</label>
            <input id="name" type="text" th:field="*{name}" placeholder="e.g. Apache Commons Lang"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

            <label for="manufacturer">Manufacturer *</label>
            <input id="manufacturer" type="text" th:field="*{manufacturer}" placeholder="e.g. Apache Software Foundation"/>
            <div class="error" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}"></div>

            <label for="sourceUrl">Source URL</label>
            <input id="sourceUrl" type="text" th:field="*{sourceUrl}" placeholder="https://github.com/..."/>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/components" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main></body>
</html>
