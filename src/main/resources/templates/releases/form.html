<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: base('Release', ~{::main})}">
<body><main>
    <h1 th:text="${release.id != null} ? 'Edit Release' : 'New Release'"></h1>
    <div class="card">
        <form th:action="${release.id != null} ? @{/releases/{id}/edit(id=${release.id})} : '/releases/new'"
              th:object="${release}" method="post">
            <label for="name">Name *</label>
            <input id="name" type="text" th:field="*{name}" placeholder="e.g. My Product 2.0"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

            <label for="tag">Tag *</label>
            <input id="tag" type="text" th:field="*{tag}" placeholder="e.g. v2.0.0"/>
            <div class="error" th:if="${#fields.hasErrors('tag')}" th:errors="*{tag}"></div>

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="3"
                      placeholder="Optional release description"></textarea>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/releases" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main></body>
</html>
