<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: base('Releases', ~{::main})}">
<body><main>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h1>Releases</h1>
        <a href="/releases/new" class="btn btn-primary">+ New Release</a>
    </div>
    <table th:if="${not #lists.isEmpty(releases)}">
        <thead>
        <tr>
            <th>Tag</th>
            <th>Name</th>
            <th>Description</th>
            <th>Components</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${releases}">
            <td><span class="tag" th:text="${r.tag}"></span></td>
            <td><a th:href="@{/releases/{id}(id=${r.id})}" th:text="${r.name}"></a></td>
            <td th:text="${r.description}"></td>
            <td th:text="${#lists.size(r.items)}"></td>
            <td class="actions">
                <a th:href="@{/releases/{id}(id=${r.id})}" class="btn btn-primary">View / BOM</a>
                <a th:href="@{/releases/{id}/edit(id=${r.id})}" class="btn btn-secondary">Edit</a>
                <form class="inline" th:action="@{/releases/{id}/delete(id=${r.id})}" method="post"
                      onsubmit="return confirm('Delete this release?')">
                    <button class="btn btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(releases)}" style="color:#6b7280;">No releases yet. Add one above.</p>
</main></body>
</html>
